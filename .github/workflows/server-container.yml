name: Server Container

on:
  pull_request:
    paths:
      - "Server/**"
      - ".github/workflows/server-container.yml"
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: server-container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-test:
    name: build-and-test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Verify Java build
        run: |
          ./gradlew --no-daemon spotlessCheck
          ./gradlew --no-daemon test
          ./gradlew --no-daemon check
          ./gradlew --no-daemon bootJar

  container:
    name: container
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/autoapi-server
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./Server
          file: ./Server/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: autoapi-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Smoke test built image
        run: |
          set -euo pipefail
          docker build -t mock-upstream:ci tests/mock-upstream
          docker network create autoapi-smoke || true
          docker run -d --name upstream-v1 --network autoapi-smoke mock-upstream:ci
          cat > /tmp/runtime-smoke.json <<'EOF'
          {
            "gateway": { "listenAddress": "0.0.0.0", "port": 8080 },
            "routes": [{
              "id": "orders-route",
              "host": "api.autoapi.local",
              "pathPrefix": "/v1/orders",
              "methods": ["GET", "POST"],
              "upstream": { "url": "http://upstream-v1:8080" }
            }]
          }
          EOF
          docker run -d --name autoapi-gateway --network autoapi-smoke -p 18081:8080 \
            -v /tmp/runtime-smoke.json:/config/runtime.json:ro \
            autoapi-server:ci --autoapi.config.path=/config/runtime.json
          ready=false
          for _ in $(seq 1 30); do
            if curl --fail --silent http://localhost:18081/readyz; then ready=true; break; fi
            sleep 2
          done
          if [ "$ready" != "true" ]; then docker logs autoapi-gateway; exit 1; fi
          curl --fail --silent http://localhost:18081/healthz
          curl --fail --silent -H 'Host: api.autoapi.local' http://localhost:18081/v1/orders/1 | grep path
          docker rm -f autoapi-gateway upstream-v1 || true
          docker network rm autoapi-smoke || true

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: autoapi-server:ci
          format: table
          exit-code: "0"
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build and push image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./Server
          file: ./Server/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
