name: Server Container

on:
  pull_request:
    paths:
      - "Server/**"
      - "tests/mock-upstream/**"
      - "deploy/config/**"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/server-container.yml"
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - "Server/**"
      - "tests/mock-upstream/**"
      - "deploy/config/**"
      - "docker-compose.yml"
      - "scripts/**"
      - ".github/workflows/server-container.yml"
  workflow_dispatch:

concurrency:
  group: server-container-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: Server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Bootstrap Gradle wrapper
        run: |
          attempt=1
          until ./gradlew --no-daemon --version; do
            if [[ "${attempt}" -ge 3 ]]; then
              echo "Gradle wrapper bootstrap failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "Gradle wrapper download failed (attempt ${attempt}); retrying in 15s..." >&2
            attempt=$((attempt + 1))
            sleep 15
          done

      - name: Verify Java build
        run: |
          ./gradlew --no-daemon spotlessCheck
          ./gradlew --no-daemon test
          ./gradlew --no-daemon check
          ./gradlew --no-daemon bootJar

  container:
    name: container
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Publication tags are computed here but applied only after smoke validation.
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/autoapi-server
          tags: |
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-,format=short,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Login to GHCR
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build once, load locally, scan and smoke-test this exact image, then tag/push if eligible.
      - name: Build candidate image
        uses: docker/build-push-action@v6
        with:
          context: ./Server
          file: ./Server/Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: autoapi-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: autoapi-server:ci
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Remove stale smoke resources
        run: |
          docker rm -f autoapi-gateway-a autoapi-gateway-b autoapi-gateway upstream-v1 upstream-v2 autoapi-postgres autoapi-redis || true
          docker volume rm autoapi-postgres-smoke autoapi-redis-smoke || true
          docker network rm autoapi-smoke || true

      - name: Smoke test built image
        timeout-minutes: 20
        run: |
          chmod +x scripts/smoke-container-candidate.sh scripts/smoke-wait-lib.sh scripts/smoke-retry-lib.sh scripts/smoke-curl-lib.sh scripts/smoke-phase5-parser-lib.sh scripts/smoke-security-env-lib.sh scripts/smoke-management-auth-lib.sh scripts/test-smoke-security-env-lib.sh scripts/test-smoke-container-startup.sh
          bash ./scripts/test-smoke-security-env-lib.sh
          bash ./scripts/test-smoke-container-startup.sh
          timeout --signal=TERM --kill-after=15s 15m \
            env CANDIDATE_IMAGE=autoapi-server:ci MOCK_UPSTREAM_IMAGE=mock-upstream:ci \
            ./scripts/smoke-container-candidate.sh

      - name: Smoke environment cleanup
        if: always()
        run: |
          docker rm -f autoapi-gateway autoapi-control-plane upstream-v1 upstream-v2 autoapi-postgres autoapi-redis || true
          docker volume rm autoapi-postgres-smoke autoapi-redis-smoke || true
          docker network rm autoapi-smoke || true

      - name: Push validated image
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        run: |
          set -euo pipefail
          if [ -z "${{ steps.meta.outputs.tags }}" ]; then
            echo "No publication tags configured for ref ${{ github.ref }}"
            exit 1
          fi
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker tag autoapi-server:ci "$tag"
            docker push "$tag"
          done <<< "${{ steps.meta.outputs.tags }}"
