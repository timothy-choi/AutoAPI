global:
  scrape_interval: 15s

scrape_configs:
  - job_name: autoapi-gateway-a
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["gateway-a:8080"]
  - job_name: autoapi-control-plane
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["control-plane:8080"]
