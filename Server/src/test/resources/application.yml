autoapi:
  security:
    api-key-pepper: development-only-test-pepper-minimum-sixteen-characters
  management-auth:
    enabled: true
    token:
      pepper: development-only-test-management-pepper-minimum-sixteen
    bootstrap:
      enabled: true
      token: test-bootstrap-admin-token-for-integration-tests-only
  gateway:
    observability:
      tracing-enabled: false
  discovery:
    stale-reaper-interval: 1h
  events:
    outbox-poll-interval: 1h
    cleanup-interval: 1h
  webhooks:
    worker-poll-interval: 1h
    security:
      master-key: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      allow-loopback: true
      require-https: false
