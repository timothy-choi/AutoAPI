server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  main:
    web-application-type: reactive
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/autoapi?sslMode=disable}
    username: ${SPRING_R2DBC_USERNAME:${POSTGRES_USER:autoapi}}
    password: ${SPRING_R2DBC_PASSWORD:${POSTGRES_PASSWORD:autoapi}}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/autoapi}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:autoapi}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:autoapi}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.autoapi: INFO

autoapi:
  role: ${AUTOAPI_ROLE:combined}
  config:
    path: ${AUTOAPI_CONFIG_PATH:deploy/config/runtime.json}
  controlplane:
    enabled: ${AUTOAPI_CONTROLPLANE_ENABLED:true}
    gateway-stale-after: ${AUTOAPI_CONTROLPLANE_GATEWAY_STALE_AFTER:30s}
    compiled-gateway:
      listen-address: 0.0.0.0
      port: 8080
  gateway:
    config-source: ${AUTOAPI_GATEWAY_CONFIG_SOURCE:static}
    id: ${AUTOAPI_GATEWAY_ID:}
    group: ${AUTOAPI_GATEWAY_GROUP:default}
    software-version: ${AUTOAPI_GATEWAY_SOFTWARE_VERSION:0.1.0-SNAPSHOT}
    api-id: ${AUTOAPI_GATEWAY_API_ID:}
    control-plane-base-url: ${AUTOAPI_CONTROL_PLANE_BASE_URL:http://control-plane:8080}
    poll-interval: ${AUTOAPI_GATEWAY_POLL_INTERVAL:5s}
    initial-load-timeout: ${AUTOAPI_GATEWAY_INITIAL_LOAD_TIMEOUT:30s}
    heartbeat-interval: ${AUTOAPI_GATEWAY_HEARTBEAT_INTERVAL:10s}
    heartbeat-timeout: ${AUTOAPI_GATEWAY_HEARTBEAT_TIMEOUT:3s}
    listen-address: ${AUTOAPI_GATEWAY_LISTEN_ADDRESS:0.0.0.0}
    port: ${AUTOAPI_GATEWAY_PORT:8080}
    control-plane-client:
      connect-timeout: 5s
      response-timeout: 15s
      max-in-memory-size-bytes: 4194304
