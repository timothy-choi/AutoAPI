server:
  shutdown: graceful

spring:
  lifecycle:
    timeout-per-shutdown-phase: 30s
  main:
    web-application-type: reactive
  data:
    redis:
      url: ${AUTOAPI_REDIS_URL:redis://127.0.0.1:6379}
      timeout: 1s
      connect-timeout: 2s
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/autoapi?sslMode=disable}
    username: ${SPRING_R2DBC_USERNAME:${POSTGRES_USER:autoapi}}
    password: ${SPRING_R2DBC_PASSWORD:${POSTGRES_PASSWORD:autoapi}}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/autoapi}
    username: ${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:autoapi}}
    password: ${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:autoapi}}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    root: INFO
    com.autoapi: INFO

autoapi:
  role: ${AUTOAPI_ROLE:combined}
  security:
    api-key-pepper: ${AUTOAPI_API_KEY_PEPPER:}
  config:
    path: ${AUTOAPI_CONFIG_PATH:deploy/config/runtime.json}
  controlplane:
    enabled: ${AUTOAPI_CONTROLPLANE_ENABLED:true}
    gateway-stale-after: ${AUTOAPI_CONTROLPLANE_GATEWAY_STALE_AFTER:30s}
    compiled-gateway:
      listen-address: 0.0.0.0
      port: 8080
  gateway:
    config-source: ${AUTOAPI_GATEWAY_CONFIG_SOURCE:static}
    id: ${AUTOAPI_GATEWAY_ID:}
    group: ${AUTOAPI_GATEWAY_GROUP:default}
    software-version: ${AUTOAPI_GATEWAY_SOFTWARE_VERSION:0.1.0-SNAPSHOT}
    api-id: ${AUTOAPI_GATEWAY_API_ID:}
    control-plane-base-url: ${AUTOAPI_CONTROL_PLANE_BASE_URL:http://control-plane:8080}
    poll-interval: ${AUTOAPI_GATEWAY_POLL_INTERVAL:5s}
    initial-load-timeout: ${AUTOAPI_GATEWAY_INITIAL_LOAD_TIMEOUT:30s}
    heartbeat-interval: ${AUTOAPI_GATEWAY_HEARTBEAT_INTERVAL:10s}
    heartbeat-timeout: ${AUTOAPI_GATEWAY_HEARTBEAT_TIMEOUT:3s}
    listen-address: ${AUTOAPI_GATEWAY_LISTEN_ADDRESS:0.0.0.0}
    port: ${AUTOAPI_GATEWAY_PORT:8080}
    control-plane-client:
      connect-timeout: 5s
      response-timeout: 15s
      max-in-memory-size-bytes: 4194304
    redis:
      url: ${AUTOAPI_REDIS_URL:redis://redis:6379}
      connect-timeout: 2s
      command-timeout: 1s
    observability:
      tracing-enabled: ${AUTOAPI_GATEWAY_TRACING_ENABLED:true}
      trace-sample-rate: ${AUTOAPI_GATEWAY_TRACE_SAMPLE_RATE:1.0}
      otlp-endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:}
      service-name: ${OTEL_SERVICE_NAME:autoapi-gateway}
      request-summary-buffer-size: 200
    retry:
      max-replay-body-bytes: ${AUTOAPI_GATEWAY_RETRY_MAX_REPLAY_BODY_BYTES:1048576}
  discovery:
    enabled: ${AUTOAPI_DISCOVERY_ENABLED:true}
    heartbeat-interval: ${AUTOAPI_DISCOVERY_HEARTBEAT_INTERVAL:10s}
    default-lease-duration: ${AUTOAPI_DISCOVERY_DEFAULT_LEASE_DURATION:30s}
    min-lease-duration: ${AUTOAPI_DISCOVERY_MIN_LEASE_DURATION:5s}
    max-lease-duration: ${AUTOAPI_DISCOVERY_MAX_LEASE_DURATION:5m}
    stale-reaper-interval: ${AUTOAPI_DISCOVERY_STALE_REAPER_INTERVAL:5s}
    stale-reaper-batch-size: ${AUTOAPI_DISCOVERY_STALE_REAPER_BATCH_SIZE:100}
    stale-retention: ${AUTOAPI_DISCOVERY_STALE_RETENTION:24h}
    auto-activate-on-membership-change: ${AUTOAPI_DISCOVERY_AUTO_ACTIVATE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  metrics:
    tags:
      application: autoapi-server
