services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: autoapi
      POSTGRES_USER: autoapi
      POSTGRES_PASSWORD: autoapi
    ports:
      - "5432:5432"
    volumes:
      - autoapi-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoapi -d autoapi"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  upstream-v1:
    image: mock-upstream:smoke
    build:
      context: ./tests/mock-upstream
    environment:
      UPSTREAM_ID: upstream-v1
    ports:
      - "9080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  upstream-v2:
    image: mock-upstream:smoke
    build:
      context: ./tests/mock-upstream
    environment:
      UPSTREAM_ID: upstream-v2
    ports:
      - "9081:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  stable-v1:
    image: mock-upstream:smoke
    build:
      context: ./tests/mock-upstream
    environment:
      UPSTREAM_ID: stable-v1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  stable-v2:
    image: mock-upstream:smoke
    build:
      context: ./tests/mock-upstream
    environment:
      UPSTREAM_ID: stable-v2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  canary-v1:
    image: mock-upstream:smoke
    build:
      context: ./tests/mock-upstream
    environment:
      UPSTREAM_ID: canary-v1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 5

  control-plane:
    image: autoapi-server:smoke
    build:
      context: ./Server
    ports:
      - "8081:8080"
    environment:
      AUTOAPI_ROLE: control-plane
      AUTOAPI_CONTROLPLANE_ENABLED: "true"
      AUTOAPI_CONTROLPLANE_GATEWAY_STALE_AFTER: 15s
      AUTOAPI_API_KEY_PEPPER: development-only-change-me-not-for-production-use
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/autoapi
      SPRING_DATASOURCE_USERNAME: autoapi
      SPRING_DATASOURCE_PASSWORD: autoapi
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/autoapi?sslMode=disable
      SPRING_R2DBC_USERNAME: autoapi
      SPRING_R2DBC_PASSWORD: autoapi
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 40s

  gateway-a:
    image: autoapi-server:smoke
    build:
      context: ./Server
    ports:
      - "8080:8080"
    environment:
      AUTOAPI_ROLE: gateway
      AUTOAPI_CONTROLPLANE_ENABLED: "false"
      AUTOAPI_GATEWAY_CONFIG_SOURCE: control-plane
      AUTOAPI_GATEWAY_ID: gateway-a
      AUTOAPI_GATEWAY_GROUP: default
      AUTOAPI_CONTROL_PLANE_BASE_URL: http://control-plane:8080
      AUTOAPI_GATEWAY_API_ID: ${AUTOAPI_GATEWAY_API_ID:-}
      AUTOAPI_GATEWAY_POLL_INTERVAL: 3s
      AUTOAPI_GATEWAY_HEARTBEAT_INTERVAL: 5s
      AUTOAPI_API_KEY_PEPPER: development-only-change-me-not-for-production-use
      AUTOAPI_REDIS_URL: redis://redis:6379
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
      upstream-v1:
        condition: service_healthy
      upstream-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 60s

  gateway-b:
    image: autoapi-server:smoke
    build:
      context: ./Server
    ports:
      - "8082:8080"
    environment:
      AUTOAPI_ROLE: gateway
      AUTOAPI_CONTROLPLANE_ENABLED: "false"
      AUTOAPI_GATEWAY_CONFIG_SOURCE: control-plane
      AUTOAPI_GATEWAY_ID: gateway-b
      AUTOAPI_GATEWAY_GROUP: default
      AUTOAPI_CONTROL_PLANE_BASE_URL: http://control-plane:8080
      AUTOAPI_GATEWAY_API_ID: ${AUTOAPI_GATEWAY_API_ID:-}
      AUTOAPI_GATEWAY_POLL_INTERVAL: 3s
      AUTOAPI_GATEWAY_HEARTBEAT_INTERVAL: 5s
      AUTOAPI_API_KEY_PEPPER: development-only-change-me-not-for-production-use
      AUTOAPI_REDIS_URL: redis://redis:6379
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
      upstream-v1:
        condition: service_healthy
      upstream-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 60s

  gateway-c:
    image: autoapi-server:smoke
    build:
      context: ./Server
    ports:
      - "8083:8080"
    environment:
      AUTOAPI_ROLE: gateway
      AUTOAPI_CONTROLPLANE_ENABLED: "false"
      AUTOAPI_GATEWAY_CONFIG_SOURCE: control-plane
      AUTOAPI_GATEWAY_ID: gateway-c
      AUTOAPI_GATEWAY_GROUP: default
      AUTOAPI_CONTROL_PLANE_BASE_URL: http://control-plane:8080
      AUTOAPI_GATEWAY_API_ID: ${AUTOAPI_GATEWAY_API_ID:-}
      AUTOAPI_GATEWAY_POLL_INTERVAL: 3s
      AUTOAPI_GATEWAY_HEARTBEAT_INTERVAL: 5s
      AUTOAPI_API_KEY_PEPPER: development-only-change-me-not-for-production-use
      AUTOAPI_REDIS_URL: redis://redis:6379
    depends_on:
      control-plane:
        condition: service_healthy
      redis:
        condition: service_healthy
      upstream-v1:
        condition: service_healthy
      upstream-v2:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/readyz"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 60s

volumes:
  autoapi-postgres-data:

networks:
  default:
    name: autoapi-phase4
